<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Ying Pun Graffiti | 西營盤塗鴉</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Shadows+Into+Light&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #2d2d3a;
            --accent-red: #c0392b;
            --paper-bg: #e8e4dc;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --text-muted: #5a5a5a;
        }

        body {
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            background: var(--primary-dark);
            position: relative;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(192, 57, 43, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(192, 57, 43, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(255, 255, 255, 0.03) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(2%, 2%) rotate(1deg);
            }

            66% {
                transform: translate(-1%, 1%) rotate(-1deg);
            }
        }

        /* 涂鸦装饰元素 */
        .graffiti-decor {
            position: absolute;
            font-family: 'Permanent Marker', cursive;
            color: rgba(255, 255, 255, 0.04);
            font-size: 8rem;
            pointer-events: none;
            z-index: 1;
            transform: rotate(-15deg);
        }

        .graffiti-decor:nth-child(1) {
            top: 10%;
            left: 5%;
        }

        .graffiti-decor:nth-child(2) {
            bottom: 15%;
            right: 5%;
            transform: rotate(10deg);
            font-size: 6rem;
        }

        .graffiti-decor:nth-child(3) {
            top: 50%;
            left: 2%;
            transform: rotate(-5deg);
            font-size: 4rem;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 主标题区域 */
        .hero-section {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInUp 1s ease-out;
        }

        .subtitle {
            font-family: 'Shadows Into Light', cursive;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 400;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .main-title span {
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
        }

        .title-divider {
            width: 60px;
            height: 2px;
            background: var(--accent-red);
            margin: 30px auto;
            position: relative;
        }

        .title-divider::before,
        .title-divider::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
        }

        .title-divider::before {
            left: -4px;
        }

        .title-divider::after {
            right: -4px;
        }

        .tagline {
            font-family: 'Shadows Into Light', cursive;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        /* 语言选择卡片 */
        .lang-selector {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .lang-card {
            position: relative;
            width: 280px;
            height: 380px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .lang-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(192, 57, 43, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .lang-card:hover {
            transform: translateY(-10px);
            border-color: rgba(192, 57, 43, 0.5);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.3),
                0 0 40px rgba(192, 57, 43, 0.1);
        }

        .lang-card:hover::before {
            opacity: 1;
        }


        .lang-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .lang-title-cn {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .lang-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .lang-desc {
            margin-top: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            line-height: 1.6;
        }

        /* 装饰线条 */
        .card-line {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.5s;
        }

        .lang-card:hover .card-line {
            width: 80px;
            background: var(--accent-red);
        }

        /* 角落装饰 */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s;
        }

        .corner-tl {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .corner-tr {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bl {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
        }

        .corner-br {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }

        .lang-card:hover .corner {
            width: 40px;
            height: 40px;
            border-color: rgba(192, 57, 43, 0.5);
        }

        /* 底部信息 */
        .footer-info {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            letter-spacing: 2px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .footer-info p {
            margin: 5px 0;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .lang-selector {
                flex-direction: column;
                align-items: center;
            }

            .lang-card {
                width: 260px;
                height: 320px;
            }

            .graffiti-decor {
                font-size: 4rem;
            }
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loader">
        <div class="loading-spinner"></div>
    </div>

    <!-- 背景动画 -->
    <div class="bg-animation"></div>

    <!-- 涂鸦装饰 -->
    <div class="graffiti-decor">ART</div>
    <div class="graffiti-decor">STREET</div>
    <div class="graffiti-decor">HK</div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 标题区域 -->
        <div class="hero-section">
            <p class="subtitle">Welcome · 歡迎</p>
            <h1 class="main-title">
                Sai Ying Pun<br>
                <span>西營盤</span>
            </h1>
            <div class="title-divider"></div>
            <p class="tagline">Discover the Graffiti Culture · 探索塗鴉文化</p>
        </div>

        <!-- 语言选择 -->
        <div class="lang-selector">
            <!-- 英文选项 -->
            <a href="en/index.html" class="lang-card">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <h2 class="lang-title">English</h2>
                <p class="lang-subtitle">Site</p>
                <p class="lang-desc">Explore the vibrant street art and graffiti culture of Sai Ying Pun</p>
                <div class="card-line"></div>
            </a>

            <!-- 中文选项 -->
            <a href="cn/index.html" class="lang-card">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <h2 class="lang-title-cn">中文</h2>
                <p class="lang-subtitle">站點</p>
                <p class="lang-desc">探索西營盤充滿活力的街頭藝術與塗鴉文化</p>
                <div class="card-line"></div>
            </a>
        </div>


    </div>

    <script>
        // 页面加载完成后隐藏加载动画
        window.addEventListener('load', function () {
            setTimeout(function () {
                document.getElementById('loader').classList.add('hidden');
            }, 500);
        });

        // 添加卡片悬停效果
        document.querySelectorAll('.lang-card').forEach(card => {
            card.addEventListener('mouseenter', function () {
                this.style.transform = 'translateY(-10px)';
            });

            card.addEventListener('mouseleave', function () {
                this.style.transform = 'translateY(0)';
            });
        });
    </script>
</body>

</html>
