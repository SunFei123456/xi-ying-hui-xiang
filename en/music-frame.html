<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
</head>
<body>
    <audio id="bgAudio" loop preload="auto">
        <source src="audio/bgm.mp3" type="audio/mpeg">
    </audio>
    <script>
        const audio = document.getElementById('bgAudio');
        let lastVolume = 0.5;
        let lastPlayTime = 0;
        let checkInterval = null;

        // Listen for messages from parent page
        window.addEventListener('message', function(event) {
            if (event.data.type === 'PLAY') {
                if (event.data.currentTime) {
                    audio.currentTime = event.data.currentTime;
                }
                audio.volume = event.data.volume || 0.5;
                audio.play().catch(e => console.log('Play failed:', e));
            } else if (event.data.type === 'PAUSE') {
                audio.pause();
            } else if (event.data.type === 'SET_VOLUME') {
                audio.volume = event.data.volume;
                lastVolume = event.data.volume;
            } else if (event.data.type === 'GET_STATE') {
                parent.postMessage({
                    type: 'STATE',
                    isPlaying: !audio.paused,
                    currentTime: audio.currentTime,
                    volume: audio.volume
                }, '*');
            } else if (event.data.type === 'SYNC_REQUEST') {
                parent.postMessage({
                    type: 'STATE',
                    isPlaying: !audio.paused,
                    currentTime: audio.currentTime,
                    volume: audio.volume
                }, '*');
            }
        });

        // Save state periodically
        checkInterval = setInterval(function() {
            if (!audio.paused) {
                lastPlayTime = audio.currentTime;
                lastVolume = audio.volume;
            }
        }, 500);

        // Notify parent of state changes
        audio.addEventListener('play', function() {
            parent.postMessage({
                type: 'PLAYING_CHANGED',
                isPlaying: true,
                currentTime: audio.currentTime
            }, '*');
        });

        audio.addEventListener('pause', function() {
            parent.postMessage({
                type: 'PLAYING_CHANGED',
                isPlaying: false,
                currentTime: audio.currentTime
            }, '*');
        });

        // Resume playback state on load
        audio.addEventListener('canplay', function() {
            if (lastPlayTime > 0) {
                audio.currentTime = lastPlayTime;
            }
        });
    </script>
</body>
</html>
