<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🎵 Background Music</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            max-width: 260px;
        }
        .title {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 12px;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }
        .btn {
            background: #e74c3c;
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover {
            transform: scale(1.1);
            background: #c0392b;
        }
        .btn.pause-btn {
            background: #27ae60;
        }
        .btn.pause-btn:hover {
            background: #1e8449;
        }
        .status {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        .info {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <div class="title">🎵 Sai Ying Pun Graffiti Culture</div>
        <audio id="bgAudio" preload="auto" loop>
            <source src="audio/bgm.mp3" type="audio/mpeg">
        </audio>
        <div class="controls">
            <button class="btn pause-btn" id="playBtn" onclick="togglePlay()">▶</button>
        </div>
        <div class="status" id="status">Click play to start</div>
        <div class="info">Music will continue when switching pages</div>
    </div>

    <script>
        const audio = document.getElementById('bgAudio');
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        let isPlaying = false;

        // Try to autoplay on load
        audio.play().then(function() {
            isPlaying = true;
            updateUI();
        }).catch(function() {
            console.log('Waiting for user interaction');
        });

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
        }

        audio.addEventListener('play', function() {
            isPlaying = true;
            updateUI();
            notifyParent();
        });

        audio.addEventListener('pause', function() {
            isPlaying = false;
            updateUI();
            notifyParent();
        });

        function updateUI() {
            if (isPlaying) {
                playBtn.innerHTML = '⏸';
                playBtn.classList.add('pause-btn');
                status.textContent = 'Now playing...';
            } else {
                playBtn.innerHTML = '▶';
                playBtn.classList.remove('pause-btn');
                status.textContent = 'Paused';
            }
        }

        function notifyParent() {
            try {
                window.opener.postMessage({
                    type: isPlaying ? 'PLAYING' : 'PAUSED',
                    isPlaying: isPlaying
                }, '*');
            } catch(e) {}
        }

        // Listen for messages from parent page
        window.addEventListener('message', function(event) {
            if (event.data.type === 'PLAY') {
                audio.play();
            } else if (event.data.type === 'PAUSE') {
                audio.pause();
            } else if (event.data.type === 'GET_STATE') {
                try {
                    window.opener.postMessage({
                        type: 'STATE',
                        isPlaying: isPlaying
                    }, '*');
                } catch(e) {}
            }
        });

        // Save position periodically
        setInterval(function() {
            try {
                localStorage.setItem('syp_music_time', audio.currentTime);
            } catch(e) {}
        }, 1000);
    </script>
</body>
</html>
